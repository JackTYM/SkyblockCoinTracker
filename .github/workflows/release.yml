name: Release

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'gradle.properties'
      - 'settings.gradle'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest release version
        id: get_latest
        run: |
          LATEST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // "v0.9"' 2>/dev/null || echo "v0.9")
          # Strip 'v' prefix if present
          LATEST_VERSION="${LATEST_TAG#v}"
          echo "Latest version: $LATEST_VERSION"
          echo "LATEST_VERSION=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Calculate next version
        id: next_version
        run: |
          LATEST="${{ steps.get_latest.outputs.LATEST_VERSION }}"
          # Use awk to increment by 0.1
          NEXT=$(echo "$LATEST" | awk -F. '{printf "%.1f", $1 + ($2 + 1) / 10}')
          # Handle edge case where version might be whole number
          if [[ "$LATEST" != *.* ]]; then
            NEXT=$(echo "$LATEST + 0.1" | bc)
          fi
          echo "Next version: $NEXT"
          echo "VERSION=$NEXT" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          LATEST_TAG="${{ steps.get_latest.outputs.LATEST_TAG }}"

          # Get commits since last release
          if git rev-parse "$LATEST_TAG" >/dev/null 2>&1; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$LATEST_TAG"..HEAD)
          else
            # No previous tag, get recent commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" -20)
          fi

          # Write to file to preserve newlines
          echo "$COMMITS" > changelog.txt

          # Also output for the release body
          {
            echo 'CHANGELOG<<EOF'
            echo "## Changes"
            echo ""
            echo "$COMMITS"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build
        env:
          MOD_VERSION: ${{ steps.next_version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.next_version.outputs.VERSION }}
          name: Release v${{ steps.next_version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: false
          files: |
            build/libs/*[!-sources].jar

      - name: Get Modrinth project ID
        id: modrinth_id
        run: |
          RESPONSE=$(curl -s -H "Authorization: ${{ secrets.MODRINTH_TOKEN }}" \
            "https://api.modrinth.com/v2/project/${{ vars.MODRINTH_PROJECT_ID }}")
          echo "API Response: $RESPONSE"
          PROJECT_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          echo "Resolved project ID: $PROJECT_ID"
          echo "PROJECT_ID=$PROJECT_ID" >> $GITHUB_OUTPUT

      - name: Publish to Modrinth
        if: steps.modrinth_id.outputs.PROJECT_ID != '' && steps.modrinth_id.outputs.PROJECT_ID != 'null'
        continue-on-error: true
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ steps.modrinth_id.outputs.PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          files: build/libs/!(*-sources).jar
          name: SkyblockCoinTracker v${{ steps.next_version.outputs.VERSION }}
          version: ${{ steps.next_version.outputs.VERSION }}
          version-type: release
          changelog: ${{ steps.changelog.outputs.CHANGELOG }}

          loaders: fabric
          game-versions: 1.21.x
          dependencies: |
            fabric-api | depends
